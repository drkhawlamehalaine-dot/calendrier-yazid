<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Présidentiel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d1117;
    font-family: 'Playfair Display', Georgia, serif;
    background-image: radial-gradient(ellipse at 20% 0%, #1a2540 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, #1a1a2e 0%, transparent 60%);
    color: #e8d5a3;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #c9a84c44; border-radius: 3px; }

  /* HEADER */
  #header {
    padding: 24px 40px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #c9a84c33;
  }
  #header .logo { display: flex; align-items: center; gap: 14px; }
  #header .emblem {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg,#c9a84c,#f5d17a);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  #header h1 { color: #c9a84c; font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  #header h2 { color: #8892a4; font-size: 12px; font-family: 'Crimson Pro', serif; letter-spacing: 1px; margin-top: 2px; }
  #save-status {
    padding: 4px 14px; border-radius: 20px; font-size: 11px;
    font-family: 'Crimson Pro', serif; letter-spacing: 1px;
    transition: all .3s;
  }
  #save-status.saved { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf5044; }
  #save-status.saving { background: #2a2a1a; color: #c9a84c; border: 1px solid #c9a84c44; }

  /* NAV */
  #nav {
    padding: 20px 40px 8px;
    display: flex; align-items: center; justify-content: center; gap: 24px;
  }
  .nav-btn {
    background: #c9a84c22; border: 1px solid #c9a84c55;
    color: #c9a84c; width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; font-size: 18px; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: #c9a84c44; }
  .nav-btn:disabled { background: transparent; border-color: #333; color: #333; cursor: default; }
  #month-title { color: #e8d5a3; font-size: 28px; font-weight: 700; letter-spacing: 1px; min-width: 260px; text-align: center; }
  #month-title span { color: #c9a84c; }

  /* GRID */
  #cal-wrap { padding: 0 32px 24px; }
  #day-headers {
    display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 6px;
  }
  .day-header {
    text-align: center; color: #c9a84c; font-size: 11px;
    font-family: 'Crimson Pro', serif; letter-spacing: 2px;
    padding: 8px 0; text-transform: uppercase;
  }
  #cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
  .day-cell {
    min-height: 90px; border-radius: 8px; padding: 8px 6px 6px;
    border: 1px solid #ffffff0f; cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .day-cell:hover { background: #1c2340 !important; }
  .day-cell.today { background: #1a2a1a !important; border-color: #c9a84c; }
  .day-cell.empty { border: none; cursor: default; background: transparent !important; }
  .day-num {
    font-size: 13px; font-family: 'Crimson Pro', serif;
    color: #8892a4; margin-bottom: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .day-cell.today .day-num { color: #c9a84c; font-weight: 700; }
  .today-dot { font-size: 7px; color: #c9a84c; }
  .event-chip {
    border-radius: 3px; padding: 2px 5px; font-size: 9.5px;
    font-family: 'Crimson Pro', serif; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.3px; margin-bottom: 2px;
    transition: opacity .15s;
  }
  .event-chip:hover { opacity: .8; }
  .more-label { font-size: 9px; color: #c9a84c88; font-family: 'Crimson Pro', serif; padding-left: 2px; margin-top: 1px; }

  /* LEGEND */
  #legend {
    padding: 0 40px 20px;
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .legend-label { color: #8892a4; font-size: 11px; font-family: 'Crimson Pro', serif; letter-spacing: 1px; }

  /* MODAL */
  #modal-bg {
    display: none; position: fixed; inset: 0;
    background: #000000bb; align-items: center; justify-content: center; z-index: 100;
  }
  #modal-bg.open { display: flex; }
  #modal {
    background: #12172a; border: 1px solid #c9a84c44;
    border-radius: 12px; padding: 28px 32px; width: 420px;
    box-shadow: 0 24px 80px #000000cc;
  }
  #modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  #modal-title { color: #c9a84c; font-weight: 700; font-size: 16px; letter-spacing: 1px; }
  #modal-date { color: #8892a4; font-size: 12px; font-family: 'Crimson Pro', serif; font-weight: 400; margin-top: 3px; }
  #btn-delete {
    background: #8b1a1a; border: none; color: #fdf6e3;
    border-radius: 6px; padding: 5px 12px; font-size: 11px;
    cursor: pointer; font-family: 'Crimson Pro', serif; display: none;
  }
  .form-label { color: #8892a4; font-size: 11px; font-family: 'Crimson Pro', serif; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
  .form-group { margin-bottom: 14px; }
  .form-input, .form-textarea {
    width: 100%; background: #0d1117; border: 1px solid #c9a84c44;
    border-radius: 6px; padding: 9px 12px; color: #e8d5a3;
    font-family: 'Crimson Pro', serif; font-size: 14px; outline: none;
  }
  .form-textarea { resize: none; }
  .type-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-btn {
    background: #0d1117; color: #8892a4; border: 1px solid #333;
    border-radius: 6px; padding: 5px 12px; font-size: 12px;
    cursor: pointer; font-family: 'Crimson Pro', serif; transition: all .15s;
  }
  .type-btn.active-Officiel     { background: #c9a84c; color: #1a1a2e; border-color: #c9a84c; }
  .type-btn.active-Confidentiel { background: #8b1a1a; color: #fdf6e3; border-color: #8b1a1a; }
  .type-btn.active-Diplomatique { background: #1a4a6b; color: #e8d5a3; border-color: #1a4a6b; }
  .type-btn.active-Interne      { background: #2d5a2d; color: #e8f5e8; border-color: #2d5a2d; }
  #modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  #btn-cancel {
    background: transparent; border: 1px solid #333; color: #8892a4;
    border-radius: 8px; padding: 9px 20px; cursor: pointer;
    font-family: 'Crimson Pro', serif; font-size: 13px;
  }
  #btn-save {
    background: linear-gradient(135deg,#c9a84c,#f5d17a); border: none;
    color: #1a1a2e; border-radius: 8px; padding: 9px 24px; cursor: pointer;
    font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 700;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <div class="emblem">⚜</div>
    <div>
      <h1>Agenda Présidentiel</h1>
      <h2>Planning Officiel — Confidentiel</h2>
    </div>
  </div>
  <div id="save-status" class="saved">✓ Sauvegardé</div>
</div>

<!-- NAVIGATION -->
<div id="nav">
  <button class="nav-btn" id="btn-prev">&#8249;</button>
  <div id="month-title"></div>
  <button class="nav-btn" id="btn-next">&#8250;</button>
</div>

<!-- CALENDAR -->
<div id="cal-wrap">
  <div id="day-headers">
    <div class="day-header">Lun</div><div class="day-header">Mar</div>
    <div class="day-header">Mer</div><div class="day-header">Jeu</div>
    <div class="day-header">Ven</div><div class="day-header">Sam</div>
    <div class="day-header">Dim</div>
  </div>
  <div id="cal-grid"></div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div><span class="legend-label">Officiel</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b1a1a"></div><span class="legend-label">Confidentiel</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a4a6b"></div><span class="legend-label">Diplomatique</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#2d5a2d"></div><span class="legend-label">Interne</span></div>
</div>

<!-- MODAL -->
<div id="modal-bg">
  <div id="modal">
    <div id="modal-header">
      <div>
        <div id="modal-title">Nouvel événement</div>
        <div id="modal-date"></div>
      </div>
      <button id="btn-delete">Supprimer</button>
    </div>
    <div class="form-group">
      <div class="form-label">Titre de l'événement</div>
      <input class="form-input" id="inp-title" type="text" placeholder="Ex: Conseil des ministres...">
    </div>
    <div class="form-group">
      <div class="form-label">Heure</div>
      <input class="form-input" id="inp-time" type="time" value="09:00">
    </div>
    <div class="form-group">
      <div class="form-label">Catégorie</div>
      <div class="type-btns" id="type-btns">
        <button class="type-btn" data-type="Officiel">Officiel</button>
        <button class="type-btn" data-type="Confidentiel">Confidentiel</button>
        <button class="type-btn" data-type="Diplomatique">Diplomatique</button>
        <button class="type-btn" data-type="Interne">Interne</button>
      </div>
    </div>
    <div class="form-group">
      <div class="form-label">Notes</div>
      <textarea class="form-input form-textarea" id="inp-note" rows="2" placeholder="Remarques, lieu, participants..."></textarea>
    </div>
    <div id="modal-footer">
      <button id="btn-cancel">Annuler</button>
      <button id="btn-save">Confirmer</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const DAYS_SHORT = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const TYPE_COLORS = {
  "Officiel":     { bg:"#c9a84c", text:"#1a1a2e" },
  "Confidentiel": { bg:"#8b1a1a", text:"#fdf6e3" },
  "Diplomatique": { bg:"#1a4a6b", text:"#e8d5a3" },
  "Interne":      { bg:"#2d5a2d", text:"#e8f5e8" },
};

const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let events = {};
let editDay = null, editIdx = null, selectedType = "Officiel";

// ── STORAGE ──────────────────────────────────────────
const SKEY = "agenda_presidential_v1";
function load() {
  try { const d = localStorage.getItem(SKEY); if(d) events = JSON.parse(d); } catch{}
}
let saveTimer;
function save() {
  document.getElementById("save-status").className = "saving";
  document.getElementById("save-status").textContent = "↻ Sauvegarde...";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(SKEY, JSON.stringify(events));
      document.getElementById("save-status").className = "saved";
      document.getElementById("save-status").textContent = "✓ Sauvegardé";
    } catch {
      document.getElementById("save-status").textContent = "✗ Erreur";
    }
  }, 500);
}

function dateKey(y,m,d) {
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

// ── RENDER ───────────────────────────────────────────
function render() {
  // Title
  const el = document.getElementById("month-title");
  el.innerHTML = MONTHS[viewMonth] + " <span>" + viewYear + "</span>";

  // Nav buttons
  const atStart = (viewYear === today.getFullYear() && viewMonth === today.getMonth());
  const atEnd   = (viewYear === 2026 && viewMonth === 11);
  document.getElementById("btn-prev").disabled = atStart;
  document.getElementById("btn-next").disabled = atEnd;

  // Grid
  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  let firstDay = new Date(viewYear, viewMonth, 1).getDay();
  firstDay = firstDay === 0 ? 6 : firstDay - 1;

  // Empty cells
  for(let i=0; i<firstDay; i++){
    const c = document.createElement("div");
    c.className = "day-cell empty";
    grid.appendChild(c);
  }
  // Day cells
  for(let d=1; d<=daysInMonth; d++){
    const key = dateKey(viewYear, viewMonth, d);
    const dayEvs = events[key] || [];
    const isToday = (d===today.getDate() && viewMonth===today.getMonth() && viewYear===today.getFullYear());

    const cell = document.createElement("div");
    cell.className = "day-cell" + (isToday?" today":"");
    cell.onclick = () => openAdd(d);

    // Day number
    const num = document.createElement("div");
    num.className = "day-num";
    if(isToday) num.innerHTML = '<span class="today-dot">●</span>' + d;
    else num.textContent = d;
    cell.appendChild(num);

    // Events
    dayEvs.slice(0,3).forEach((ev, idx) => {
      const chip = document.createElement("div");
      chip.className = "event-chip";
      const col = TYPE_COLORS[ev.type] || TYPE_COLORS["Officiel"];
      chip.style.background = col.bg;
      chip.style.color = col.text;
      chip.textContent = ev.time + " · " + ev.title;
      chip.onclick = (e) => { e.stopPropagation(); openEdit(d, idx); };
      cell.appendChild(chip);
    });
    if(dayEvs.length > 3){
      const more = document.createElement("div");
      more.className = "more-label";
      more.textContent = "+" + (dayEvs.length-3) + " autre(s)";
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  }
}

// ── MODAL ────────────────────────────────────────────
function openAdd(day) {
  editDay = day; editIdx = null;
  document.getElementById("modal-title").textContent = "Nouvel événement";
  document.getElementById("modal-date").textContent = day + " " + MONTHS[viewMonth] + " " + viewYear;
  document.getElementById("inp-title").value = "";
  document.getElementById("inp-time").value = "09:00";
  document.getElementById("inp-note").value = "";
  document.getElementById("btn-delete").style.display = "none";
  setType("Officiel");
  document.getElementById("modal-bg").classList.add("open");
  setTimeout(()=>document.getElementById("inp-title").focus(),100);
}
function openEdit(day, idx) {
  const key = dateKey(viewYear, viewMonth, day);
  const ev = events[key][idx];
  editDay = day; editIdx = idx;
  document.getElementById("modal-title").textContent = "Modifier l'événement";
  document.getElementById("modal-date").textContent = day + " " + MONTHS[viewMonth] + " " + viewYear;
  document.getElementById("inp-title").value = ev.title;
  document.getElementById("inp-time").value = ev.time;
  document.getElementById("inp-note").value = ev.note || "";
  document.getElementById("btn-delete").style.display = "block";
  setType(ev.type || "Officiel");
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
}
function setType(t) {
  selectedType = t;
  document.querySelectorAll(".type-btn").forEach(b => {
    b.className = "type-btn" + (b.dataset.type===t ? " active-"+t : "");
  });
}
function saveEvent() {
  const title = document.getElementById("inp-title").value.trim();
  if(!title) return;
  const key = dateKey(viewYear, viewMonth, editDay);
  if(!events[key]) events[key] = [];
  const ev = { title, time: document.getElementById("inp-time").value, type: selectedType, note: document.getElementById("inp-note").value };
  if(editIdx !== null) events[key][editIdx] = ev;
  else events[key].push(ev);
  events[key].sort((a,b) => a.time.localeCompare(b.time));
  closeModal();
  save();
  render();
}
function deleteEvent() {
  const key = dateKey(viewYear, viewMonth, editDay);
  events[key].splice(editIdx, 1);
  if(!events[key].length) delete events[key];
  closeModal();
  save();
  render();
}

// ── EVENTS ───────────────────────────────────────────
document.getElementById("btn-prev").onclick = () => {
  if(viewMonth===0){ viewYear--; viewMonth=11; } else viewMonth--;
  render();
};
document.getElementById("btn-next").onclick = () => {
  if(viewMonth===11){ viewYear++; viewMonth=0; } else viewMonth++;
  render();
};
document.getElementById("btn-cancel").onclick = closeModal;
document.getElementById("modal-bg").onclick = (e) => { if(e.target===e.currentTarget) closeModal(); };
document.getElementById("btn-save").onclick = saveEvent;
document.getElementById("btn-delete").onclick = deleteEvent;
document.querySelectorAll(".type-btn").forEach(b => b.onclick = () => setType(b.dataset.type));
document.addEventListener("keydown", e => {
  if(e.key==="Escape") closeModal();
  if(e.key==="Enter" && document.getElementById("modal-bg").classList.contains("open")) saveEvent();
});

// ── INIT ─────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
